<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pageant Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      font-size: 12px;
    }

    .sidebar {
      width: 250px;
      background: #252525;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .preview {
      width: 350px;
      background: #1e1e1e;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 8px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #333;
    }

    h1 {
      font-size: 16px;
      font-weight: 500;
    }

    h2 {
      font-size: 14px;
      font-weight: 500;
    }

    .section-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .section {
      margin-bottom: 6px;
    }

    .section-header {
      padding: 4px 8px;
      background: #2d2d2d;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
      font-size: 11px;
    }

    .section-header:hover {
      background: #333;
    }

    .section-type {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 2px;
      background: #444;
      color: #aaa;
    }

    .section-type.slot {
      background: #4a3c28;
      color: #f0ad4e;
    }

    .section-type.list {
      background: #2b4c3f;
      color: #5cb85c;
    }

    .files-list {
      padding-left: 8px;
      display: none;
    }

    .section.expanded .files-list {
      display: block;
    }

    .file-item, .subsection-item {
      padding: 3px 6px;
      cursor: pointer;
      border-radius: 2px;
      margin: 1px 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }

    .file-item:hover, .subsection-item:hover {
      background: #333;
    }

    .subsection-files {
      padding-left: 8px;
      display: none;
    }

    .subsection-item.expanded .subsection-files {
      display: block;
    }

    .template-view {
      flex: 1;
      padding: 8px;
      overflow-y: auto;
    }

    .template-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .template-items {
      background: #252525;
      border-radius: 4px;
      padding: 8px;
    }

    .template-item {
      padding: 4px 6px;
      background: #2d2d2d;
      border-radius: 3px;
      margin-bottom: 3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }

    .template-item:hover {
      background: #333;
    }

    .btn {
      padding: 3px 6px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
    }

    .btn:hover {
      background: #357abd;
    }

    .btn-danger {
      background: #d9534f;
    }

    .btn-danger:hover {
      background: #c9302c;
    }

    .btn-success {
      background: #5cb85c;
    }

    .btn-success:hover {
      background: #449d44;
    }

    .btn-sm {
      padding: 2px 4px;
      font-size: 9px;
    }

    .loading {
      padding: 10px;
      text-align: center;
      color: #666;
      font-size: 11px;
    }

    .error {
      padding: 4px 6px;
      background: #3a1515;
      border: 1px solid #5a2020;
      border-radius: 3px;
      color: #f0adad;
      margin-bottom: 4px;
      font-size: 11px;
    }

    .success {
      padding: 4px 6px;
      background: #1a3a1a;
      border: 1px solid #2a5a2a;
      border-radius: 3px;
      color: #90ee90;
      margin-bottom: 4px;
      font-size: 11px;
    }

    .empty-state {
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 11px;
    }

    .preview-content {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
      color: #d0d0d0;
    }

    .preview-content h1 { font-size: 18px; margin: 12px 0 8px; color: #e0e0e0; }
    .preview-content h2 { font-size: 16px; margin: 10px 0 6px; color: #d8d8d8; }
    .preview-content h3 { font-size: 14px; margin: 8px 0 4px; color: #d0d0d0; }
    .preview-content p { margin: 6px 0; }
    .preview-content ul { margin: 6px 0; padding-left: 20px; }
    .preview-content li { margin: 2px 0; }
    .preview-content code { background: #2a2a2a; padding: 1px 3px; border-radius: 2px; }
    .preview-content pre { background: #2a2a2a; padding: 8px; border-radius: 3px; margin: 6px 0; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="header">
      <h1>Available Personas</h1>
    </div>
    <div class="section-list" id="sectionList">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <h1>Current Template</h1>
    </div>
    <div class="template-view">
      <div id="messages"></div>
      <div class="template-header">
        <h2>Active Personas</h2>
      </div>
      <div class="template-items" id="templateItems">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <div class="preview">
    <div class="header">
      <h1>Preview</h1>
    </div>
    <div class="preview-content" id="previewContent">
      <div class="loading">Loading preview...</div>
    </div>
  </div>

  <script>
    let manifest = {};
    let template = { items: [] };
    let keepAliveInterval = null;

    // Start keep-alive ping immediately
    function startKeepAlive() {
      // Send FIRST ping RIGHT NOW - don't wait!
      fetch('/api/keepalive', { method: 'POST' })
        .then(() => console.log('Initial keep-alive sent'))
        .catch(error => console.error('Initial keep-alive failed:', error));

      // Then send keep-alive every 30 seconds
      keepAliveInterval = setInterval(async () => {
        try {
          await fetch('/api/keepalive', { method: 'POST' });
          console.log('Keep-alive sent');
        } catch (error) {
          console.error('Keep-alive failed:', error);
        }
      }, 30000);
    }

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
      if (keepAliveInterval) {
        clearInterval(keepAliveInterval);
      }
    });

    async function loadManifest() {
      try {
        const response = await fetch('/api/manifest?nocache=' + Date.now());
        const result = await response.json();

        if (result.success) {
          manifest = result.data;
          renderSections();
        } else {
          showError('Failed to load manifest: ' + result.error);
        }
      } catch (error) {
        showError('Failed to load manifest: ' + error.message);
      }
    }

    async function loadTemplate() {
      try {
        const response = await fetch('/api/template?nocache=' + Date.now());
        const result = await response.json();

        if (result.success) {
          template = result.data;
          renderTemplate();
          loadPreview(); // Load preview whenever template changes
        } else {
          showError('Failed to load template: ' + result.error);
        }
      } catch (error) {
        showError('Failed to load template: ' + error.message);
      }
    }

    async function loadPreview() {
      try {
        const response = await fetch('/api/compiled?nocache=' + Date.now());
        const result = await response.json();

        if (result.success) {
          const preview = document.getElementById('previewContent');
          // Simple markdown rendering (basic)
          let html = result.data
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/^# (.+)$/gm, '<h1>$1</h1>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`(.+?)`/g, '<code>$1</code>');
          preview.innerHTML = html;
        } else {
          document.getElementById('previewContent').innerHTML = '<div class="error">Failed to load preview</div>';
        }
      } catch (error) {
        document.getElementById('previewContent').innerHTML = '<div class="error">Failed to load preview: ' + error.message + '</div>';
      }
    }

    function renderSections() {
      const container = document.getElementById('sectionList');
      container.innerHTML = '';

      Object.entries(manifest).forEach(([name, section]) => {
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section';

        const headerDiv = document.createElement('div');
        headerDiv.className = 'section-header';

        // Fix label for slots vs lists
        const typeLabel = section.type === 'slot' ? 'SLOT' : section.type === 'list' ? 'LIST' : section.type.toUpperCase();

        headerDiv.innerHTML = `
          <span>${name}</span>
          <span class="section-type ${section.type}">${typeLabel}</span>
        `;
        headerDiv.onclick = () => sectionDiv.classList.toggle('expanded');

        const filesDiv = document.createElement('div');
        filesDiv.className = 'files-list';

        // Add direct files
        section.files.forEach(file => {
          const fileDiv = document.createElement('div');
          fileDiv.className = 'file-item';
          fileDiv.innerHTML = `
            <span>📄 ${file}</span>
            <button class="btn btn-success btn-sm" onclick="addPersona('${name}', null, '${file}')">Add</button>
          `;
          filesDiv.appendChild(fileDiv);
        });

        // Add subsections
        Object.entries(section.subsections || {}).forEach(([subName, subsection]) => {
          const subDiv = document.createElement('div');
          subDiv.className = 'subsection-item';

          const subHeader = document.createElement('div');
          subHeader.style.display = 'flex';
          subHeader.style.justifyContent = 'space-between';
          subHeader.style.alignItems = 'center';
          subHeader.style.width = '100%';

          // Fix label for subsection slots vs lists
          const subTypeLabel = subsection.type === 'slot' ? 'SLOT' : subsection.type === 'list' ? 'LIST' : subsection.type.toUpperCase();

          subHeader.innerHTML = `
            <span>📁 ${subName}</span>
            <span class="section-type ${subsection.type}">${subTypeLabel}</span>
          `;
          subHeader.onclick = (e) => {
            e.stopPropagation();
            subDiv.classList.toggle('expanded');
          };

          const subFilesDiv = document.createElement('div');
          subFilesDiv.className = 'subsection-files';

          subsection.files.forEach(file => {
            const fileDiv = document.createElement('div');
            fileDiv.className = 'file-item';
            fileDiv.innerHTML = `
              <span>📄 ${file}</span>
              <button class="btn btn-success btn-sm" onclick="addPersona('${name}', '${subName}', '${file}')">Add</button>
            `;
            subFilesDiv.appendChild(fileDiv);
          });

          subDiv.appendChild(subHeader);
          subDiv.appendChild(subFilesDiv);
          filesDiv.appendChild(subDiv);
        });

        sectionDiv.appendChild(headerDiv);
        sectionDiv.appendChild(filesDiv);
        container.appendChild(sectionDiv);
      });
    }

    function renderTemplate() {
      const container = document.getElementById('templateItems');

      if (!template.items || template.items.length === 0) {
        container.innerHTML = '<div class="empty-state">No personas in template yet. Add some from the left sidebar!</div>';
        return;
      }

      container.innerHTML = '';
      template.items.forEach(item => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'template-item';

        const parts = [];
        if (item.section) {
          const sectionName = item.section.replace(/^\d+[-_]/, '');
          parts.push(sectionName);
        }
        if (item.subsection) parts.push(item.subsection);
        if (item.file) parts.push(item.file.replace('.md', ''));

        itemDiv.innerHTML = `
          <span>${parts.join(' / ')}</span>
          <button class="btn btn-danger btn-sm" onclick="removePersona('${item.section}', '${item.subsection}', '${item.file.replace('.md', '')}')">Remove</button>
        `;
        container.appendChild(itemDiv);
      });
    }

    async function addPersona(section, subsection, partial) {
      try {
        const response = await fetch('/api/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ section, subsection, partial })
        });

        const result = await response.json();

        if (result.success) {
          showSuccess(result.message);
          await loadTemplate();
        } else {
          showError('Failed to add: ' + result.error);
        }
      } catch (error) {
        showError('Failed to add: ' + error.message);
      }
    }

    async function removePersona(section, subsection, partial) {
      // Parse the section to get just the name without number prefix
      const sectionName = section.replace(/^\d+[-_]/, '');

      try {
        const response = await fetch('/api/remove', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            section: sectionName,
            subsection: subsection === 'null' ? null : subsection,
            partial
          })
        });

        const result = await response.json();

        if (result.success) {
          showSuccess(result.message);
          await loadTemplate();
        } else {
          showError('Failed to remove: ' + result.error);
        }
      } catch (error) {
        showError('Failed to remove: ' + error.message);
      }
    }

    function showError(message) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'error';
      div.textContent = message;
      container.appendChild(div);
      setTimeout(() => div.remove(), 5000);
    }

    function showSuccess(message) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'success';
      div.textContent = message;
      container.appendChild(div);
      setTimeout(() => div.remove(), 5000);
    }

    // Initialize - START KEEPALIVE FIRST!
    startKeepAlive();
    loadManifest();
    loadTemplate();
  </script>
</body>
</html>
